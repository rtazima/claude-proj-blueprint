<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint Agent Monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117; --bg-card: #161b22; --border: #30363d;
    --text: #c9d1d9; --text-muted: #8b949e; --text-bright: #f0f6fc;
    --green: #2ea043; --blue: #388bfd; --gray: #484f58;
    --red: #f85149; --yellow: #d29922; --purple: #a371f7; --gold: #e3b341;
    --orange: #d18616;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  }

  code, .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg-card); flex-shrink: 0;
  }
  .header h1 { font-size: 16px; color: var(--text-bright); font-weight: 600; }
  .header .status { display: flex; gap: 16px; align-items: center; font-size: 13px; }
  .header .status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .header .elapsed { color: var(--text-muted); font-size: 13px; }

  /* Main area */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Graph panel */
  .graph-panel {
    flex: 0 0 60%; border-right: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .graph-panel svg { width: 100%; height: 100%; }
  .graph-panel .placeholder {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--text-muted); font-size: 14px;
  }

  /* SVG styles */
  .agent-node { cursor: pointer; transition: opacity 0.2s; }
  .agent-node:hover { opacity: 0.85; }
  .agent-label { font-family: system-ui, sans-serif; font-size: 11px; fill: var(--text); text-anchor: middle; }
  .agent-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: var(--text-muted); text-anchor: middle; }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; r: 0; }
    50% { opacity: 0; }
  }
  .pulse-ring { animation: pulse 2s ease-in-out infinite; }

  .flow-line { fill: none; stroke-width: 1.5; }
  .flow-line.active { stroke-dasharray: 6 4; animation: dash 1s linear infinite; }
  @keyframes dash { to { stroke-dashoffset: -10; } }
  .flow-label { font-size: 9px; fill: var(--text-muted); font-family: system-ui, sans-serif; }

  /* Arrow markers are defined inline in SVG defs */

  /* Timeline panel */
  .timeline-panel {
    flex: 0 0 40%; display: flex; flex-direction: column; overflow: hidden;
  }
  .timeline-header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text-bright);
    background: var(--bg-card); display: flex; justify-content: space-between;
    align-items: center; flex-shrink: 0;
  }
  .timeline-filter {
    font-size: 11px; color: var(--text-muted); cursor: pointer;
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 8px; color: var(--text-muted);
  }
  .timeline-filter:hover { border-color: var(--text-muted); }
  .timeline-list {
    flex: 1; overflow-y: auto; padding: 8px 0;
  }
  .timeline-list::-webkit-scrollbar { width: 6px; }
  .timeline-list::-webkit-scrollbar-track { background: transparent; }
  .timeline-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .event-row {
    display: flex; gap: 8px; padding: 6px 16px; font-size: 12px;
    align-items: flex-start; transition: background 0.15s;
  }
  .event-row:hover { background: var(--bg-card); }
  .event-time { color: var(--text-muted); white-space: nowrap; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .event-agent { font-weight: 600; color: var(--text-bright); white-space: nowrap; }
  .event-desc { color: var(--text); word-break: break-word; }

  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 13px; flex-direction: column; gap: 8px;
  }
  .error-msg { color: var(--red); }

  /* Findings panel */
  .findings-panel {
    border-top: 1px solid var(--border); background: var(--bg-card); flex-shrink: 0;
  }
  .findings-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px; cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text-bright); user-select: none;
  }
  .findings-toggle:hover { background: #1c2129; }
  .findings-toggle .arrow { transition: transform 0.2s; font-size: 10px; color: var(--text-muted); }
  .findings-toggle .arrow.open { transform: rotate(90deg); }
  .findings-body {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  }
  .findings-body.open { max-height: 200px; overflow-y: auto; }
  .findings-body::-webkit-scrollbar { width: 6px; }
  .findings-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .finding-row {
    display: flex; gap: 8px; padding: 6px 20px; font-size: 12px; align-items: center;
  }
  .finding-row:hover { background: #1c2129; }
  .badge {
    font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px;
    white-space: nowrap; font-family: 'JetBrains Mono', monospace;
  }
  .badge-critical { background: var(--red); color: #fff; }
  .badge-must { background: var(--orange); color: #fff; }
  .badge-should { background: var(--yellow); color: #0d1117; }
  .badge-consider { background: var(--blue); color: #fff; }
  .finding-agent { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  .finding-cat { color: var(--purple); font-size: 11px; white-space: nowrap; }
  .finding-msg { color: var(--text); word-break: break-word; }
</style>
</head>
<body>

<div class="header">
  <h1 id="projectName">Blueprint Agent Monitor</h1>
  <div class="status" id="statusBar">
    <span class="mono" style="color:var(--text-muted)">Waiting for events...</span>
  </div>
  <div class="elapsed mono" id="elapsed">00:00:00</div>
</div>

<div class="main">
  <div class="graph-panel" id="graphPanel">
    <svg id="graphSvg">
      <defs>
        <marker id="arrow-audit" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--red)" />
        </marker>
        <marker id="arrow-data" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--green)" />
        </marker>
        <marker id="arrow-feedback" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--yellow)" />
        </marker>
        <marker id="arrow-command" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--blue)" />
        </marker>
        <marker id="arrow-sync" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--purple)" />
        </marker>
        <marker id="arrow-insight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="var(--gold)" />
        </marker>
      </defs>
      <g id="flowGroup"></g>
      <g id="nodeGroup"></g>
    </svg>
    <div class="placeholder" id="graphPlaceholder">No agents detected yet</div>
  </div>

  <div class="timeline-panel">
    <div class="timeline-header">
      <span>Event Timeline</span>
      <button class="timeline-filter" id="filterBtn" title="Click to clear filter">All agents</button>
    </div>
    <div class="timeline-list" id="timelineList">
      <div class="empty-state" id="timelineEmpty">
        <span>No events yet</span>
        <span style="font-size:11px">Watching ../logs/agent-events.jsonl</span>
      </div>
    </div>
  </div>
</div>

<div class="findings-panel">
  <div class="findings-toggle" id="findingsToggle">
    <span>Findings <span id="findingsCount" class="mono" style="color:var(--text-muted);font-size:12px">(0)</span></span>
    <span class="arrow" id="findingsArrow">&#9654;</span>
  </div>
  <div class="findings-body" id="findingsBody"></div>
</div>

<script>
  // State
  const state = {
    events: [],
    agents: {},       // name -> { status, findings, task, summary }
    flows: [],        // { from, to, type, data, active }
    findings: [],
    sessionStart: null,
    filterAgent: null,
    lastLineCount: 0,
    fetchError: false,
  };

  const FLOW_COLORS = {
    audit: '#f85149', data: '#2ea043', feedback: '#d29922',
    command: '#388bfd', sync: '#a371f7', insight: '#e3b341',
  };
  const STATUS_COLORS = {
    done: '#2ea043', running: '#388bfd', queued: '#484f58',
    error: '#f85149', warning: '#d29922', ok: '#2ea043',
  };
  const SEVERITY_CLASS = {
    'CRITICAL': 'badge-critical', 'MUST FIX': 'badge-must',
    'SHOULD FIX': 'badge-should', 'CONSIDER': 'badge-consider',
  };

  // Elements
  const $statusBar = document.getElementById('statusBar');
  const $elapsed = document.getElementById('elapsed');
  const $graphSvg = document.getElementById('graphSvg');
  const $nodeGroup = document.getElementById('nodeGroup');
  const $flowGroup = document.getElementById('flowGroup');
  const $graphPlaceholder = document.getElementById('graphPlaceholder');
  const $timelineList = document.getElementById('timelineList');
  const $timelineEmpty = document.getElementById('timelineEmpty');
  const $findingsBody = document.getElementById('findingsBody');
  const $findingsCount = document.getElementById('findingsCount');
  const $filterBtn = document.getElementById('filterBtn');

  // Findings panel toggle
  document.getElementById('findingsToggle').addEventListener('click', () => {
    $findingsBody.classList.toggle('open');
    document.getElementById('findingsArrow').classList.toggle('open');
  });

  // Filter button
  $filterBtn.addEventListener('click', () => {
    state.filterAgent = null;
    $filterBtn.textContent = 'All agents';
    renderTimeline();
  });

  function setFilter(agent) {
    state.filterAgent = agent;
    $filterBtn.textContent = agent;
    renderTimeline();
  }

  // Parse JSONL
  function parseJSONL(text) {
    const lines = text.split('\n');
    const events = [];
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      try { events.push(JSON.parse(trimmed)); } catch (e) { /* skip malformed */ }
    }
    return events;
  }

  // Process events into state
  function processEvents(events) {
    state.events = events;
    state.agents = {};
    state.flows = [];
    state.findings = [];
    state.sessionStart = null;

    // Always include "lead" agent
    state.agents['lead'] = { status: 'running', findings: 0, task: 'orchestrator', summary: '' };

    for (const ev of events) {
      if (ev.event === 'session:start') {
        state.sessionStart = new Date(ev.ts);
        if (ev.agents) {
          for (const a of ev.agents) {
            if (!state.agents[a]) state.agents[a] = { status: 'queued', findings: 0, task: '', summary: '' };
          }
        }
      } else if (ev.event === 'agent:start') {
        if (!state.agents[ev.agent]) state.agents[ev.agent] = { status: 'running', findings: 0, task: '', summary: '' };
        state.agents[ev.agent].status = 'running';
        state.agents[ev.agent].task = ev.task || '';
      } else if (ev.event === 'agent:complete') {
        if (!state.agents[ev.agent]) state.agents[ev.agent] = { status: 'done', findings: 0, task: '', summary: '' };
        const s = ev.status === 'error' ? 'error' : 'done';
        state.agents[ev.agent].status = s;
        state.agents[ev.agent].summary = ev.summary || '';
      } else if (ev.event === 'agent:finding') {
        if (!state.agents[ev.agent]) state.agents[ev.agent] = { status: 'running', findings: 0, task: '', summary: '' };
        state.agents[ev.agent].findings++;
        state.findings.push({ agent: ev.agent, severity: ev.severity, category: ev.category, message: ev.message });
      } else if (ev.event === 'agent:progress') {
        if (!state.agents[ev.agent]) state.agents[ev.agent] = { status: 'running', findings: 0, task: '', summary: '' };
        if (state.agents[ev.agent].status === 'queued') state.agents[ev.agent].status = 'running';
      } else if (ev.event === 'flow' || (ev.event && ev.event.startsWith('flow:'))) {
        const flowType = ev.event.startsWith('flow:') ? ev.event.split(':')[1] : (ev.type || 'data');
        const fromName = ev.agent || ev.from || 'lead';
        const toName = ev.to || 'lead';
        if (!state.agents[fromName] && fromName !== '_orchestrator') state.agents[fromName] = { status: 'running', findings: 0, task: '', summary: '' };
        if (!state.agents[toName]) state.agents[toName] = { status: 'running', findings: 0, task: '', summary: '' };
        state.flows.push({ from: fromName, to: toName, type: flowType, data: ev.data || '' });
      }
    }
  }

  // Render status bar
  function renderStatus() {
    const names = Object.keys(state.agents);
    const total = names.length;
    if (total === 0) { $statusBar.innerHTML = '<span class="mono" style="color:var(--text-muted)">Waiting for events...</span>'; return; }
    const counts = { done: 0, running: 0, queued: 0, error: 0 };
    for (const n of names) {
      const s = state.agents[n].status;
      if (s === 'done' || s === 'ok') counts.done++;
      else if (s === 'running') counts.running++;
      else if (s === 'error') counts.error++;
      else counts.queued++;
    }
    let html = `<span class="mono">${total} agent${total !== 1 ? 's' : ''}</span>`;
    if (counts.done) html += ` <span><span class="dot" style="background:var(--green)"></span>${counts.done} done</span>`;
    if (counts.running) html += ` <span><span class="dot" style="background:var(--blue)"></span>${counts.running} running</span>`;
    if (counts.queued) html += ` <span><span class="dot" style="background:var(--gray)"></span>${counts.queued} queued</span>`;
    if (counts.error) html += ` <span><span class="dot" style="background:var(--red)"></span>${counts.error} error</span>`;
    $statusBar.innerHTML = html;
  }

  // Render graph
  function renderGraph() {
    const names = Object.keys(state.agents).filter(n => n !== 'lead');
    const hasLead = 'lead' in state.agents;
    if (!hasLead && names.length === 0) { $graphPlaceholder.style.display = 'flex'; return; }
    $graphPlaceholder.style.display = 'none';

    const rect = document.getElementById('graphPanel').getBoundingClientRect();
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    const radius = Math.min(cx, cy) * 0.55;

    // Compute positions
    const positions = {};
    positions['lead'] = { x: cx, y: cy };
    const count = names.length;
    for (let i = 0; i < count; i++) {
      const angle = (2 * Math.PI * i / count) - Math.PI / 2;
      positions[names[i]] = { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
    }

    // Render flows
    let flowHTML = '';
    for (const flow of state.flows) {
      const from = positions[flow.from];
      const to = positions[flow.to];
      if (!from || !to) continue;
      const color = FLOW_COLORS[flow.type] || FLOW_COLORS.data;
      const marker = `url(#arrow-${flow.type in FLOW_COLORS ? flow.type : 'data'})`;
      const isActive = state.agents[flow.from]?.status === 'running';
      // Shorten line to not overlap node circles
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const fromR = nodeRadius(flow.from);
      const toR = nodeRadius(flow.to);
      const x1 = from.x + (dx / dist) * fromR;
      const y1 = from.y + (dy / dist) * fromR;
      const x2 = to.x - (dx / dist) * (toR + 10);
      const y2 = to.y - (dy / dist) * (toR + 10);
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;
      flowHTML += `<line class="flow-line${isActive ? ' active' : ''}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" marker-end="${marker}" />`;
      flowHTML += `<text class="flow-label" x="${mx}" y="${my - 5}">${flow.type}</text>`;
    }
    $flowGroup.innerHTML = flowHTML;

    // Render nodes
    let nodeHTML = '';
    const allNames = hasLead ? ['lead', ...names] : names;
    for (const name of allNames) {
      const pos = positions[name];
      if (!pos) continue;
      const agent = state.agents[name];
      const color = STATUS_COLORS[agent.status] || STATUS_COLORS.queued;
      const r = nodeRadius(name);
      nodeHTML += `<g class="agent-node" onclick="setFilter('${name}')">`;
      if (agent.status === 'running') {
        nodeHTML += `<circle class="pulse-ring" cx="${pos.x}" cy="${pos.y}" r="${r + 8}" fill="${color}" opacity="0.3"/>`;
      }
      nodeHTML += `<circle cx="${pos.x}" cy="${pos.y}" r="${r}" fill="${color}" opacity="0.85"/>`;
      nodeHTML += `<text class="agent-label" x="${pos.x}" y="${pos.y + r + 14}">${name}</text>`;
      if (agent.findings > 0) {
        nodeHTML += `<text class="agent-count" x="${pos.x}" y="${pos.y + 4}">${agent.findings}</text>`;
      }
      nodeHTML += `</g>`;
    }
    $nodeGroup.innerHTML = nodeHTML;
  }

  function nodeRadius(name) {
    const findings = state.agents[name]?.findings || 0;
    return Math.min(80, Math.max(40, 40 + findings * 6)) / 2;
  }

  // Render timeline
  function renderTimeline() {
    const filtered = state.filterAgent
      ? state.events.filter(e => e.agent === state.filterAgent || e.from === state.filterAgent || e.to === state.filterAgent)
      : state.events;

    if (filtered.length === 0) {
      $timelineEmpty.style.display = 'flex';
      return;
    }
    $timelineEmpty.style.display = 'none';

    // Show newest first
    const reversed = [...filtered].reverse();
    let html = '';
    for (const ev of reversed) {
      const time = formatTime(ev.ts);
      const dot = eventDotColor(ev);
      const agent = ev.agent || ev.from || '';
      const desc = eventDescription(ev);
      html += `<div class="event-row">
        <span class="event-time">${time}</span>
        <span class="event-dot" style="background:${dot}"></span>
        <span class="event-agent">${agent}</span>
        <span class="event-desc">${desc}</span>
      </div>`;
    }
    $timelineList.innerHTML = html;
  }

  function formatTime(ts) {
    if (!ts) return '--:--:--';
    const d = new Date(ts);
    if (isNaN(d)) return '--:--:--';
    return d.toTimeString().slice(0, 8);
  }

  function eventDotColor(ev) {
    const map = {
      'session:start': '#a371f7', 'agent:start': '#388bfd', 'agent:progress': '#388bfd',
      'agent:finding': '#d29922', 'agent:complete': '#2ea043', 'flow': '#8b949e',
    };
    if (ev.event === 'agent:complete' && ev.status === 'error') return '#f85149';
    return map[ev.event] || '#484f58';
  }

  function eventDescription(ev) {
    switch (ev.event) {
      case 'session:start': return `Session started with ${(ev.agents || []).length} agents`;
      case 'agent:start': return `Started: ${ev.task || ''}`;
      case 'agent:progress': return `${ev.tool || ''} ${ev.detail || ''}`.trim();
      case 'agent:finding': return `[${ev.severity}] ${ev.message || ''}`;
      case 'agent:complete': return `Completed (${ev.status}): ${ev.summary || ''}`;
      case 'flow': return `${ev.from} -> ${ev.to} [${ev.type}] ${ev.data || ''}`;
      default: return ev.event || '';
    }
  }

  // Render findings
  function renderFindings() {
    $findingsCount.textContent = `(${state.findings.length})`;
    if (state.findings.length === 0) {
      $findingsBody.innerHTML = '<div style="padding:12px 20px;color:var(--text-muted);font-size:12px">No findings yet</div>';
      return;
    }
    let html = '';
    for (const f of state.findings) {
      const cls = SEVERITY_CLASS[f.severity] || 'badge-consider';
      html += `<div class="finding-row">
        <span class="badge ${cls}">${f.severity}</span>
        <span class="finding-agent">${f.agent}</span>
        <span class="finding-cat">${f.category || ''}</span>
        <span class="finding-msg">${f.message || ''}</span>
      </div>`;
    }
    $findingsBody.innerHTML = html;
  }

  // Elapsed timer
  function updateElapsed() {
    if (!state.sessionStart) { $elapsed.textContent = '00:00:00'; return; }
    const diff = Math.floor((Date.now() - state.sessionStart.getTime()) / 1000);
    const h = String(Math.floor(diff / 3600)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
    const s = String(diff % 60).padStart(2, '0');
    $elapsed.textContent = `${h}:${m}:${s}`;
  }

  // Fetch and update
  async function fetchEvents() {
    try {
      const resp = await fetch('../logs/agent-events.jsonl?_=' + Date.now());
      if (!resp.ok) {
        if (!state.fetchError) {
          state.fetchError = true;
          $timelineEmpty.innerHTML = '<span>No events yet</span><span style="font-size:11px">Watching ../logs/agent-events.jsonl</span>';
          $timelineEmpty.style.display = 'flex';
        }
        return;
      }
      state.fetchError = false;
      const text = await resp.text();
      const events = parseJSONL(text);
      if (events.length === state.lastLineCount) return;
      state.lastLineCount = events.length;
      processEvents(events);
      renderStatus();
      renderGraph();
      renderTimeline();
      renderFindings();
    } catch (e) {
      if (!state.fetchError) {
        state.fetchError = true;
        $statusBar.innerHTML = '<span class="error-msg">Cannot reach server</span>';
      }
    }
  }

  // Init
  fetchEvents();
  setInterval(fetchEvents, 2000);
  setInterval(updateElapsed, 1000);

  // Resize handler for graph
  window.addEventListener('resize', () => {
    if (Object.keys(state.agents).length > 0) renderGraph();
  });
</script>
</body>
</html>
