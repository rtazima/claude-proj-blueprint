  owasp-top10:
    source: "docs/specs/security/"
    description: "OWASP Top 10 vulnerability checks"
  secrets-management:
    source: "docs/specs/security/"
    description: "Secret storage and rotation policies"
  dependency-audit:
    source: "docs/specs/security/"
    description: "Dependency vulnerability scanning"
  data-privacy:
    source: "docs/specs/compliance/"
    description: "Data protection requirements"
  audit-trail:
    source: "docs/specs/compliance/"
    description: "Audit logging requirements"
  consent-management:
    source: "docs/specs/compliance/"
    description: "User consent tracking"
  test-coverage:
    source: "docs/specs/testing-strategy/"
    description: "Coverage thresholds per module"
  definition-of-done:
    source: "docs/specs/testing-strategy/"
    description: "Acceptance criteria verification"
  query-optimization:
