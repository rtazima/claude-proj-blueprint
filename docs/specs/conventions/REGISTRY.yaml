    description: "Project-specific error handling rules"
  code-quality:
    source: "docs/specs/conventions/code-quality.md"
    description: "Naming, structure, patterns, repetition, docs, modules"
  temporal-present:
    source: ".claude/skills/slop-cleaner/SKILL.md#category-8"
    description: "Comments describe current state, not change history"
  deploy-checklist:
    source: "docs/runbooks/"
    description: "Pre-deploy verification steps"
  rollback-plan:
    source: "docs/runbooks/"
    description: "Rollback procedures"
  security-spec:
