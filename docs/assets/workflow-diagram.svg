<svg width="680" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: transparent;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- YOU -->
<rect x="250" y="30" width="180" height="44" rx="22" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">You (human)</text>

<!-- Arrow you → obsidian -->
<line x1="340" y1="74" x2="340" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OBSIDIAN - the brain -->
<rect x="150" y="115" width="380" height="120" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="142" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Obsidian (the brain)</text>
<text x="340" y="164" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Where you THINK, DECIDE, PLAN, CRITICIZE</text>

<!-- Obsidian items -->
<rect x="170" y="182" width="80" height="30" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="210" y="197" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">PRDs</text>
<rect x="260" y="182" width="80" height="30" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="300" y="197" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">ADRs</text>
<rect x="350" y="182" width="80" height="30" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="390" y="197" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Specs</text>
<rect x="440" y="182" width="80" height="30" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="480" y="197" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Reviews</text>

<!-- Arrows obsidian → figma and → claude code -->
<path d="M240 235 L140 290" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M440 235 L540 290" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow labels -->
<text x="160" y="258" text-anchor="middle" font-size="12" fill="#5F5E5A">"what it looks like"</text>
<text x="520" y="258" text-anchor="middle" font-size="12" fill="#5F5E5A">"build this"</text>

<!-- FIGMA - the eye -->
<rect x="40" y="295" width="220" height="100" rx="16" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="150" y="322" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Figma Make (the eye)</text>
<text x="150" y="344" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Where you SEE and SHAPE</text>
<text x="150" y="362" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Prototypes, design, tokens</text>

<!-- CLAUDE CODE - the hand -->
<rect x="420" y="295" width="220" height="100" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="530" y="322" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Claude Code (the hand)</text>
<text x="530" y="344" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Where you BUILD and TEST</text>
<text x="530" y="362" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Code, agents, hooks</text>

<!-- Figma → Claude Code (MCP) -->
<line x1="260" y1="345" x2="418" y2="345" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="340" y="336" text-anchor="middle" font-size="12" fill="#5F5E5A">MCP (specs)</text>

<!-- Claude Code → Obsidian (results) -->
<path d="M530 395 L530 460 L340 460 L340 490" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="480" y="432" text-anchor="middle" font-size="12" fill="#5F5E5A">"done, here's what changed"</text>

<!-- Figma → Obsidian (feedback) -->
<path d="M150 395 L150 460 L340 460" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3"/>
<text x="210" y="432" text-anchor="middle" font-size="12" fill="#993C1D">"needs redesign"</text>

<!-- OBSIDIAN again - review/critique -->
<rect x="200" y="490" width="280" height="60" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="514" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Obsidian (critique loop)</text>
<text x="340" y="534" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Review, post-mortem, next iteration</text>

<!-- Loop back up -->
<path d="M480 520 L620 520 L620 175 L532 175" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="632" y="350" font-size="12" fill="#534AB7">next cycle</text>

</svg>
